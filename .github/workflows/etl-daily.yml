name: Daily COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Runs at 6 AM UTC daily
  workflow_dispatch:     # Allows manual execution from GitHub actions tab

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute ETL Pipeline
        env:
          DATABASE_URL: sqlite:///data/covid19.db
          LOG_LEVEL: INFO
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci_dummy_secret_key_placeholder' }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY || 'ci_dummy_admin_api_key_placeholder' }}
        run: |
          python etl/pipeline.py

      - name: Upload ETL Log Artifact
        uses: actions/upload-artifact@v4
        with:
          name: etl-log
          path: data/etl.log
          if-no-files-found: warn
